services:
  registry:
    ports: !override
      - "17860:7860"
    environment:
      - AUTH_PROVIDER=keycloak
      - KEYCLOAK_ENABLED=true
      - KEYCLOAK_URL=http://auth-server:8888
      - AUTH_SERVER_EXTERNAL_URL=https://auth.mcp.joshsr.ai
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_DOMAIN=.mcp.joshsr.ai
    volumes:
      # Persist file-backed federation config for startup sync and UI updates.
      - /home/deploy/mcp-gateway/federation:/app/config/federation
    networks:
      - default
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.services.mcp-agentic-registry.loadbalancer.server.port=80
      - traefik.http.routers.mcp-agentic-registry-ui.rule=Host(`registry.mcp.joshsr.ai`)
      - traefik.http.routers.mcp-agentic-registry-ui.entrypoints=websecure
      - traefik.http.routers.mcp-agentic-registry-ui.tls=true
      - traefik.http.routers.mcp-agentic-registry-ui.tls.certresolver=cf
      - traefik.http.routers.mcp-agentic-registry-ui.service=mcp-agentic-registry

  auth-server:
    environment:
      - AUTH_PROVIDER=keycloak
      - KEYCLOAK_ENABLED=true
      - REGISTRY_URL=https://registry.mcp.joshsr.ai
      - AUTH_SERVER_EXTERNAL_URL=https://auth.mcp.joshsr.ai
      - KEYCLOAK_EXTERNAL_URL=https://keycloak.mcp.joshsr.ai
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_DOMAIN=.mcp.joshsr.ai
    volumes:
      # Ensure group->scope mappings are available to auth validation.
      - /home/deploy/mcp-gateway/auth_server/scopes.yml:/app/auth_server/scopes.yml:ro
    ports:
      - "18888:8888"
    networks:
      - default
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.services.mcp-agentic-auth.loadbalancer.server.port=8888
      - traefik.http.routers.mcp-agentic-auth.rule=Host(`auth.mcp.joshsr.ai`)
      - traefik.http.routers.mcp-agentic-auth.entrypoints=websecure
      - traefik.http.routers.mcp-agentic-auth.tls=true
      - traefik.http.routers.mcp-agentic-auth.tls.certresolver=cf
      - traefik.http.routers.mcp-agentic-auth.service=mcp-agentic-auth

  keycloak:
    ports:
      - "18080:8080"
    environment:
      - KC_FRONTEND_URL=https://keycloak.mcp.joshsr.ai
    networks:
      - default
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.services.mcp-agentic-keycloak.loadbalancer.server.port=8080
      - traefik.http.routers.mcp-agentic-keycloak.rule=Host(`keycloak.mcp.joshsr.ai`)
      - traefik.http.routers.mcp-agentic-keycloak.entrypoints=websecure
      - traefik.http.routers.mcp-agentic-keycloak.tls=true
      - traefik.http.routers.mcp-agentic-keycloak.tls.certresolver=cf
      - traefik.http.routers.mcp-agentic-keycloak.service=mcp-agentic-keycloak

  metrics-service:
    ports:
      - "18890:8890"
      - "19465:9465"

  mongodb:
    ports: []

  mcpgw-server:
    ports:
      - "8003:8003"
    environment:
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./servers/mcpgw/server.py:/app/server.py:ro
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        /app/.venv/bin/python -m ensurepip --upgrade >/dev/null 2>&1 || true
        /app/.venv/bin/python -m pip install --quiet fastapi >/dev/null 2>&1 || /app/.venv/bin/python -m pip install fastapi
        exec /entrypoint.sh
    networks:
      default:
      traefik_proxy:
      mcp_oauth_internal:
        aliases:
          - mcpgw-server

networks:
  mcp_oauth_internal:
    external: true
    name: mcp-gateway-oauth_mcp_internal
  traefik_proxy:
    external: true
