openapi: 3.0.0
info:
  title: A2A Agent Management API
  description: API for registering, discovering, and managing A2A (Agent-to-Agent) agents in the MCP Gateway Registry
  version: 1.0.0
  contact:
    name: MCP Gateway Registry
  license:
    name: MIT

servers:
  - url: http://localhost:7860
    description: Local development server
  - url: https://api.example.com
    description: Production server

security:
  - BearerToken: []

tags:
  - name: Agent Registration
    description: Register and manage agents
  - name: Agent Discovery
    description: Find agents by capability
  - name: Agent Status
    description: Enable/disable agents

paths:
  /api/agents/register:
    post:
      tags:
        - Agent Registration
      summary: Register a new A2A agent
      description: Register a new agent in the registry with full details and skills
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegistration'
      responses:
        '201':
          description: Agent registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegistrationResponse'
        '409':
          description: Conflict - Agent path already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error - Invalid JSON or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User lacks publish_agent permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents:
    get:
      tags:
        - Agent Discovery
      summary: List all agents
      description: List agents with optional filtering and search
      operationId: listAgents
      parameters:
        - name: query
          in: query
          schema:
            type: string
          description: Search query string
        - name: enabled_only
          in: query
          schema:
            type: boolean
            default: false
          description: Show only enabled agents
        - name: visibility
          in: query
          schema:
            type: string
            enum: [public, private, internal]
          description: Filter by visibility level
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'

  /api/agents/{path}:
    get:
      tags:
        - Agent Discovery
      summary: Get single agent details
      description: Retrieve full details for a specific agent by path
      operationId: getAgent
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Agent path (e.g., /code-reviewer)
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User not authorized to view agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Agent Registration
      summary: Update an existing agent
      description: Modify agent configuration and details
      operationId: updateAgent
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Agent path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegistration'
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User lacks modify_service permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Agent Registration
      summary: Delete an agent
      description: Remove an agent from the registry
      operationId: deleteAgent
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Agent path
      responses:
        '204':
          description: Agent deleted successfully
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User lacks delete permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents/{path}/toggle:
    post:
      tags:
        - Agent Status
      summary: Toggle agent enabled/disabled status
      description: Enable or disable an agent
      operationId: toggleAgent
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Agent path
        - name: enabled
          in: query
          required: true
          schema:
            type: boolean
          description: True to enable, false to disable
      responses:
        '200':
          description: Agent status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentToggleResponse'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User lacks toggle_service permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents/discover:
    post:
      tags:
        - Agent Discovery
      summary: Discover agents by skills
      description: Find agents that match required skills
      operationId: discoverAgentsBySkills
      parameters:
        - name: max_results
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Maximum number of results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillDiscoveryRequest'
      responses:
        '200':
          description: Matching agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDiscoveryResponse'
        '400':
          description: Bad request - No skills provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents/discover/semantic:
    post:
      tags:
        - Agent Discovery
      summary: Discover agents using semantic search
      description: Find agents using NLP semantic search (FAISS vector search)
      operationId: discoverAgentsSemantic
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Natural language query (e.g., "Find agents that can analyze code")
        - name: max_results
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Maximum number of results
      responses:
        '200':
          description: Matching agents based on semantic similarity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSemanticDiscoveryResponse'
        '400':
          description: Bad request - Empty query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Search error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from Keycloak or /api/tokens/generate

  schemas:
    AgentRegistration:
      type: object
      required:
        - name
        - description
        - path
        - url
        - version
        - provider
      properties:
        name:
          type: string
          description: Display name of the agent
        description:
          type: string
          description: Detailed description of the agent
        path:
          type: string
          description: Unique path for the agent (e.g., /code-reviewer)
        url:
          type: string
          format: uri
          description: URL where the agent is hosted
        version:
          type: string
          description: Version string (e.g., 1.0.0)
        provider:
          type: string
          enum: [anthropic, custom, other]
          description: Agent provider
        security_schemes:
          type: object
          description: Security schemes supported by the agent
          additionalProperties:
            type: object
            properties:
              type:
                type: string
                enum: [bearer, api_key, oauth2]
              description:
                type: string
        skills:
          type: array
          description: Array of skills provided by the agent
          items:
            $ref: '#/components/schemas/Skill'
        tags:
          type: string
          description: Comma-separated tags
        visibility:
          type: string
          enum: [public, private, internal]
          default: public
          description: Visibility level
        license:
          type: string
          description: License type (e.g., MIT, Apache-2.0)

    Skill:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: Skill name
        description:
          type: string
          description: Skill description
        input_schema:
          type: object
          description: JSON schema for skill input parameters

    AgentRegistrationResponse:
      type: object
      properties:
        message:
          type: string
        agent:
          $ref: '#/components/schemas/AgentCard'

    AgentCard:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        url:
          type: string
        num_skills:
          type: integer
        registered_at:
          type: string
          format: date-time
        is_enabled:
          type: boolean

    AgentDetail:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        description:
          type: string
        url:
          type: string
        version:
          type: string
        provider:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillDetail'
        is_enabled:
          type: boolean
        visibility:
          type: string
        security_schemes:
          type: object

    SkillDetail:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object

    AgentListResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentListItem'

    AgentListItem:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
        total_count:
          type: integer

    AgentToggleResponse:
      type: object
      properties:
        path:
          type: string
        is_enabled:
          type: boolean
        message:
          type: string

    SkillDiscoveryRequest:
      type: object
      required:
        - skills
      properties:
        skills:
          type: array
          items:
            type: string
          description: List of required skills
        tags:
          type: array
          items:
            type: string
          description: Optional tag filters

    AgentDiscoveryResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredAgent'

    DiscoveredAgent:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        relevance_score:
          type: number
          format: float
          description: Matching score (0.0 to 1.0)
        matching_skills:
          type: array
          items:
            type: string

    AgentSemanticDiscoveryResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/SemanticDiscoveredAgent'

    SemanticDiscoveredAgent:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        relevance_score:
          type: number
          format: float
          description: Semantic similarity score (0.0 to 1.0)
        description:
          type: string

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message
        error_code:
          type: string
          description: Optional error code
        request_id:
          type: string
          description: Unique request identifier
