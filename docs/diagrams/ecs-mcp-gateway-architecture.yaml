Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  Resources:
    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - Users
        - SecurityLayer
        - LoadBalancerLayer
        - TargetGroupsLayer
        - ServiceConnectLayer
        - TasksLayer
        - StorageLayer
        - DatabaseLayer
        - MonitoringLayer

    Users:
      Type: AWS::Diagram::Resource
      Preset: Users

    SecurityLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - Route53
        - ACMCert

    Route53:
      Type: AWS::Route53::HostedZone

    ACMCert:
      Type: AWS::CertificateManager::Certificate

    LoadBalancerLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - MainALB
        - KeycloakALB

    MainALB:
      Type: AWS::ElasticLoadBalancingV2::LoadBalancer
      Preset: Application Load Balancer

    KeycloakALB:
      Type: AWS::ElasticLoadBalancingV2::LoadBalancer
      Preset: Application Load Balancer

    TargetGroupsLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AuthTargetGroup
        - GradioTargetGroup
        - RegistryTargetGroup
        - KeycloakTargetGroup

    AuthTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup

    GradioTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup

    RegistryTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup

    KeycloakTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup

    ServiceConnectLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AuthServiceConnect
        - GradioServiceConnect
        - RegistryServiceConnect
        - KeycloakServiceConnect

    AuthServiceConnect:
      Type: AWS::ECS::Service

    GradioServiceConnect:
      Type: AWS::ECS::Service

    RegistryServiceConnect:
      Type: AWS::ECS::Service

    KeycloakServiceConnect:
      Type: AWS::ECS::Service

    TasksLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AuthTasksAZ1
        - RegistryTasksAZ1
        - KeycloakTasksAZ1
        - AuthTasksAZ2
        - RegistryTasksAZ2
        - KeycloakTasksAZ2

    AuthTasksAZ1:
      Type: AWS::ECS::Task

    RegistryTasksAZ1:
      Type: AWS::ECS::Task

    KeycloakTasksAZ1:
      Type: AWS::ECS::Task

    AuthTasksAZ2:
      Type: AWS::ECS::Task

    RegistryTasksAZ2:
      Type: AWS::ECS::Task

    KeycloakTasksAZ2:
      Type: AWS::ECS::Task

    StorageLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EFSSharedStorage
        - ApplicationLogsFolder
        - MLModelsFolder
        - MCPServersFolder

    EFSSharedStorage:
      Type: AWS::EFS

    ApplicationLogsFolder:
      Type: AWS::Diagram::Resource
      Preset: Folder

    MLModelsFolder:
      Type: AWS::Diagram::Resource
      Preset: Folder

    MCPServersFolder:
      Type: AWS::Diagram::Resource
      Preset: Folder

    DatabaseLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - SecretsManager
        - AuroraPostgreSQL
        - CloudWatchLogs

    SecretsManager:
      Type: AWS::SecretsManager

    AuroraPostgreSQL:
      Type: AWS::RDS::DBCluster

    CloudWatchLogs:
      Type: AWS::CloudWatch::Logs

    MonitoringLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CloudWatchAlarms
        - SNSTopic

    CloudWatchAlarms:
      Type: AWS::CloudWatch

    SNSTopic:
      Type: AWS::SNS::Topic

  Links:
    # Users to Route53
    - Source: Users
      SourcePosition: N
      Target: Route53
      TargetPosition: S
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "HTTPS"

    # Route53 to ACM Certificate
    - Source: Route53
      SourcePosition: E
      Target: ACMCert
      TargetPosition: W
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Resolves"

    # ACM Certificate to ALB
    - Source: ACMCert
      SourcePosition: S
      Target: MainALB
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Certificates"

    # MainALB to Target Groups
    - Source: MainALB
      SourcePosition: S
      Target: AuthTargetGroup
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Port 8888"

    - Source: MainALB
      SourcePosition: S
      Target: GradioTargetGroup
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Port 443"

    - Source: MainALB
      SourcePosition: S
      Target: RegistryTargetGroup
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Port 7860"

    - Source: MainALB
      SourcePosition: S
      Target: KeycloakTargetGroup
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Port 8080"

    # KeycloakALB to Keycloak Target Group
    - Source: KeycloakALB
      SourcePosition: S
      Target: KeycloakTargetGroup
      TargetPosition: N
      Type: orthogonal

    # Target Groups to Service Connect
    - Source: AuthTargetGroup
      SourcePosition: S
      Target: AuthServiceConnect
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Service Connect"

    - Source: GradioTargetGroup
      SourcePosition: S
      Target: GradioServiceConnect
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Service Connect"

    - Source: RegistryTargetGroup
      SourcePosition: S
      Target: RegistryServiceConnect
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Service Connect"

    - Source: KeycloakTargetGroup
      SourcePosition: S
      Target: KeycloakServiceConnect
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Service Connect"

    # Service Connect to Tasks AZ1
    - Source: AuthServiceConnect
      SourcePosition: S
      Target: AuthTasksAZ1
      TargetPosition: N
      Type: orthogonal

    - Source: GradioServiceConnect
      SourcePosition: S
      Target: RegistryTasksAZ1
      TargetPosition: N
      Type: orthogonal

    - Source: RegistryServiceConnect
      SourcePosition: S
      Target: RegistryTasksAZ1
      TargetPosition: N
      Type: orthogonal

    - Source: KeycloakServiceConnect
      SourcePosition: S
      Target: KeycloakTasksAZ1
      TargetPosition: N
      Type: orthogonal

    # Service Connect to Tasks AZ2
    - Source: AuthServiceConnect
      SourcePosition: S
      Target: AuthTasksAZ2
      TargetPosition: N
      Type: orthogonal

    - Source: GradioServiceConnect
      SourcePosition: S
      Target: RegistryTasksAZ2
      TargetPosition: N
      Type: orthogonal

    - Source: RegistryServiceConnect
      SourcePosition: S
      Target: RegistryTasksAZ2
      TargetPosition: N
      Type: orthogonal

    - Source: KeycloakServiceConnect
      SourcePosition: S
      Target: KeycloakTasksAZ2
      TargetPosition: N
      Type: orthogonal

    # Tasks to EFS Storage
    - Source: AuthTasksAZ1
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Reads/Writes"

    - Source: RegistryTasksAZ1
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "Reads/Writes"

    - Source: KeycloakTasksAZ1
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Logs"

    - Source: AuthTasksAZ2
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal

    - Source: RegistryTasksAZ2
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal

    - Source: KeycloakTasksAZ2
      SourcePosition: S
      Target: EFSSharedStorage
      TargetPosition: N
      Type: orthogonal

    # EFS to Folders
    - Source: EFSSharedStorage
      SourcePosition: S
      Target: ApplicationLogsFolder
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "/logs"

    - Source: EFSSharedStorage
      SourcePosition: S
      Target: MLModelsFolder
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceLeft:
          Title: "/models"

    - Source: EFSSharedStorage
      SourcePosition: S
      Target: MCPServersFolder
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "/servers"

    # Tasks to Secrets Manager
    - Source: AuthTasksAZ1
      SourcePosition: E
      Target: SecretsManager
      TargetPosition: W
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Secrets"

    - Source: KeycloakTasksAZ1
      SourcePosition: E
      Target: SecretsManager
      TargetPosition: W
      Type: orthogonal

    # Keycloak to Database
    - Source: KeycloakTasksAZ1
      SourcePosition: E
      Target: AuroraPostgreSQL
      TargetPosition: W
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "JDBC"

    - Source: KeycloakTasksAZ2
      SourcePosition: E
      Target: AuroraPostgreSQL
      TargetPosition: W
      Type: orthogonal

    # Tasks to CloudWatch Logs
    - Source: AuthTasksAZ1
      SourcePosition: E
      Target: CloudWatchLogs
      TargetPosition: W
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Logs"

    - Source: RegistryTasksAZ1
      SourcePosition: E
      Target: CloudWatchLogs
      TargetPosition: W
      Type: orthogonal

    - Source: KeycloakTasksAZ1
      SourcePosition: E
      Target: CloudWatchLogs
      TargetPosition: W
      Type: orthogonal

    # CloudWatch Logs to Alarms
    - Source: CloudWatchLogs
      SourcePosition: S
      Target: CloudWatchAlarms
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Metrics"

    # CloudWatch Alarms to SNS
    - Source: CloudWatchAlarms
      SourcePosition: S
      Target: SNSTopic
      TargetPosition: N
      Type: orthogonal
      Labels:
        SourceRight:
          Title: "Notify"
