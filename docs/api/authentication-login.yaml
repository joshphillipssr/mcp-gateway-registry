openapi: 3.0.0
info:
  title: Authentication & Login API
  description: OAuth2 and session-based authentication endpoints for user login/logout and provider management
  version: 1.0.0
  contact:
    name: MCP Gateway Registry
  license:
    name: MIT

servers:
  - url: http://localhost:7860
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Login
    description: User login endpoints
  - name: Logout
    description: User logout endpoints
  - name: OAuth2
    description: OAuth2 authentication flow
  - name: Providers
    description: Authentication provider information

paths:
  /api/auth/login:
    get:
      tags:
        - Login
      summary: Get login form
      description: Display login form with available OAuth2 providers
      operationId: getLoginForm
      parameters:
        - name: error
          in: query
          schema:
            type: string
          description: Error message to display
      responses:
        '200':
          description: HTML login form
          content:
            text/html:
              schema:
                type: string

    post:
      tags:
        - Login
      summary: Submit login credentials
      description: Handle login form submission with username and password
      operationId: submitLogin
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Username
                password:
                  type: string
                  format: password
                  description: Password
      responses:
        '302':
          description: Redirect to home on success or login with error
          headers:
            Set-Cookie:
              schema:
                type: string
                example: mcp_gateway_session=<session_value>; Path=/; HttpOnly; Secure
        '401':
          description: Authentication failed - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/auth/{provider}:
    get:
      tags:
        - OAuth2
      summary: Initiate OAuth2 authentication
      description: Redirect to OAuth2 provider for authentication
      operationId: initiateOAuth2
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [keycloak, cognito, oauth2]
          description: OAuth2 provider name
      responses:
        '302':
          description: Redirect to OAuth2 provider authentication endpoint

  /api/auth/auth/callback:
    get:
      tags:
        - OAuth2
      summary: Handle OAuth2 callback
      description: Process OAuth2 provider callback after user authentication
      operationId: handleOAuth2Callback
      parameters:
        - name: error
          in: query
          schema:
            type: string
          description: Error code from provider
        - name: details
          in: query
          schema:
            type: string
          description: Error details
        - name: code
          in: query
          schema:
            type: string
          description: Authorization code from provider
        - name: state
          in: query
          schema:
            type: string
          description: State parameter for CSRF protection
      responses:
        '302':
          description: Redirect to home on success or login with error
          headers:
            Set-Cookie:
              schema:
                type: string
                example: mcp_gateway_session=<session_value>; Path=/; HttpOnly; Secure

  /api/auth/logout:
    get:
      tags:
        - Logout
      summary: Logout via GET
      description: Log out user via GET request (clears session)
      operationId: logoutGet
      responses:
        '302':
          description: Redirect to login page
          headers:
            Set-Cookie:
              schema:
                type: string
                example: mcp_gateway_session=; Path=/; Max-Age=0

    post:
      tags:
        - Logout
      summary: Logout via POST
      description: Log out user via POST request (clears session)
      operationId: logoutPost
      responses:
        '302':
          description: Redirect to login page
          headers:
            Set-Cookie:
              schema:
                type: string
                example: mcp_gateway_session=; Path=/; Max-Age=0

  /api/auth/providers:
    get:
      tags:
        - Providers
      summary: Get available OAuth2 providers
      description: List all configured OAuth2 providers available for authentication
      operationId: getProviders
      responses:
        '200':
          description: List of available providers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersResponse'

  /api/auth/me:
    get:
      tags:
        - Login
      summary: Get current user information
      description: Get authentication and user details for current authenticated session
      operationId: getCurrentUser
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: mcp_gateway_session
      description: Session cookie set after successful login

  schemas:
    ProvidersResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'

    Provider:
      type: object
      required:
        - name
        - display_name
      properties:
        name:
          type: string
          description: Provider identifier (e.g., keycloak)
        display_name:
          type: string
          description: Display name for UI
        icon:
          type: string
          description: Icon identifier
        description:
          type: string
          description: Provider description
        authorization_endpoint:
          type: string
          format: uri
          description: OAuth2 authorization endpoint
        config:
          type: object
          description: Provider-specific configuration

    UserInfo:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: Username
        email:
          type: string
          format: email
          description: User email
        auth_method:
          type: string
          enum: [oauth2, form, basic]
          description: Authentication method used
        provider:
          type: string
          description: OAuth2 provider name
        scopes:
          type: array
          items:
            type: string
          description: User's assigned scopes/permissions
        groups:
          type: array
          items:
            type: string
          description: User's group memberships
        is_admin:
          type: boolean
          description: Whether user is an administrator
        attributes:
          type: object
          description: Additional user attributes
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message
        error_code:
          type: string
          description: Optional error code
        request_id:
          type: string
          description: Unique request identifier
