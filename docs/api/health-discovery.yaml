openapi: 3.0.0
info:
  title: Public Discovery & Health API
  description: Public MCP server discovery and simple health check endpoints
  version: 1.0.0
  contact:
    name: MCP Gateway Registry
  license:
    name: MIT

servers:
  - url: http://localhost:7860
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Public Discovery
    description: Public MCP server discovery
  - name: Health Check
    description: Service health check endpoint

paths:
  /.well-known/mcp-servers:
    get:
      tags:
        - Public Discovery
      summary: Public MCP server discovery
      description: Public MCP server discovery endpoint for client tools (no authentication required)
      operationId: discoverServers
      parameters:
        - name: enabled_only
          in: query
          schema:
            type: boolean
            default: true
          description: Show only enabled servers
      responses:
        '200':
          description: List of MCP servers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicServerDiscoveryResponse'

  /health:
    get:
      tags:
        - Health Check
      summary: Service health check
      description: Simple health check for load balancers and monitoring
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckSimpleResponse'

components:
  schemas:
    PublicServerDiscoveryResponse:
      type: object
      required:
        - servers
        - _meta
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/PublicServer'
        _meta:
          $ref: '#/components/schemas/DiscoveryMeta'

    PublicServer:
      type: object
      required:
        - id
        - name
        - description
        - mcp
      properties:
        id:
          type: string
          description: Server identifier (reverse-DNS format)
        name:
          type: string
          description: Display name
        description:
          type: string
          description: Server description
        mcp:
          $ref: '#/components/schemas/MCPConfig'
        tools_preview:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
          description: Preview of available tools (limited to 5)
        authentication:
          $ref: '#/components/schemas/PublicAuthentication'
        homepage:
          type: string
          format: uri
          description: Server homepage URL
        repository:
          type: string
          format: uri
          description: Repository URL

    MCPConfig:
      type: object
      required:
        - transport
        - url
      properties:
        transport:
          type: string
          enum: [streamable-http, stdio, sse]
          description: MCP transport protocol
        url:
          type: string
          format: uri
          description: Server endpoint URL

    PublicAuthentication:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [none, bearer, api_key, oauth2]
          description: Authentication type
        description:
          type: string
          description: Authentication details

    DiscoveryMeta:
      type: object
      required:
        - registry
        - updated_at
      properties:
        registry:
          type: string
          description: Registry name
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        server_count:
          type: integer
          description: Total number of servers
        enabled_count:
          type: integer
          description: Number of enabled servers

    HealthCheckSimpleResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          description: Service status
        service:
          type: string
          description: Service name
        timestamp:
          type: string
          format: date-time
          description: Check timestamp
        version:
          type: string
          description: Service version
        uptime_seconds:
          type: integer
          description: Service uptime
