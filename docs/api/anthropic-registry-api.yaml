openapi: 3.0.0
info:
  title: Anthropic MCP Registry API v0
  description: Official Anthropic MCP Registry API specification for discovering MCP servers and A2A agents with cursor-based pagination
  version: 0.1.0
  contact:
    name: MCP Gateway Registry
  license:
    name: MIT

servers:
  - url: http://localhost:7860
    description: Local development server
  - url: https://api.example.com
    description: Production server

security:
  - BearerToken: []

tags:
  - name: MCP Servers
    description: Standard MCP server discovery
  - name: A2A Agents
    description: A2A agent discovery via Anthropic API format

paths:
  /v0/servers:
    get:
      tags:
        - MCP Servers
      summary: List all MCP servers
      description: List all MCP servers with cursor-based pagination
      operationId: listServers
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
            minimum: 1
          description: Maximum items per page
      responses:
        '200':
          description: List of MCP servers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerListResponse'

  /v0/servers/{serverName}/versions:
    get:
      tags:
        - MCP Servers
      summary: List server versions
      description: List all versions for a specific MCP server
      operationId: listServerVersions
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
          description: URL-encoded reverse-DNS server name (e.g., io.mcpgateway%2Fexample-server)
      responses:
        '200':
          description: List of server versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionListResponse'
        '404':
          description: Server not found or user lacks access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/servers/{serverName}/versions/{version}:
    get:
      tags:
        - MCP Servers
      summary: Get server version details
      description: Get detailed information about a specific server version
      operationId: getServerVersion
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
          description: URL-encoded server name
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version string or 'latest'
      responses:
        '200':
          description: Complete server version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerVersionDetail'
        '404':
          description: Server/version not found or user lacks access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/agents:
    get:
      tags:
        - A2A Agents
      summary: List all A2A agents
      description: List all A2A agents using Anthropic API format
      operationId: listAgents
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
            minimum: 1
          description: Maximum items per page
      responses:
        '200':
          description: List of A2A agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'

  /v0/agents/{agentName}/versions:
    get:
      tags:
        - A2A Agents
      summary: List agent versions
      description: List all versions for a specific A2A agent
      operationId: listAgentVersions
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
          description: URL-encoded agent name (e.g., io.mcpgateway%2Fcode-reviewer)
      responses:
        '200':
          description: List of agent versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionListResponse'
        '404':
          description: Agent not found or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/agents/{agentName}/versions/{version}:
    get:
      tags:
        - A2A Agents
      summary: Get agent version details
      description: Get detailed information about a specific agent version
      operationId: getAgentVersion
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
          description: URL-encoded agent name
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version string or 'latest'
      responses:
        '200':
          description: Complete agent version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionDetail'
        '404':
          description: Agent not found, disabled, or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from Keycloak or /api/tokens/generate

  schemas:
    ServerListResponse:
      type: object
      required:
        - servers
        - _meta
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/Server'
        _meta:
          $ref: '#/components/schemas/PaginationMeta'

    Server:
      type: object
      required:
        - id
        - name
        - description
      properties:
        id:
          type: string
          description: Reverse-DNS identifier (e.g., io.mcpgateway/example-server)
        name:
          type: string
          description: Display name
        description:
          type: string
          description: Server description
        homepage:
          type: string
          format: uri
          description: Server homepage URL
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'

    Resource:
      type: object
      required:
        - uri
      properties:
        uri:
          type: string
          description: Resource URI (e.g., example://resource)
        mimeType:
          type: string
          description: MIME type of resource

    Tool:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: Tool name
        description:
          type: string
          description: Tool description
        inputSchema:
          type: object
          description: JSON Schema for tool input

    PaginationMeta:
      type: object
      required:
        - pagination
      properties:
        pagination:
          type: object
          required:
            - hasMore
            - nextCursor
          properties:
            hasMore:
              type: boolean
              description: Whether more results are available
            nextCursor:
              type: string
              nullable: true
              description: Cursor for next page (null if no more results)

    VersionListResponse:
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Version'

    Version:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          description: Version string (e.g., 1.0.0)

    ServerVersionDetail:
      type: object
      required:
        - id
        - name
        - description
        - version
      properties:
        id:
          type: string
          description: Server identifier
        name:
          type: string
        description:
          type: string
        version:
          type: string
        homepage:
          type: string
          format: uri
        repository:
          type: string
          format: uri
          description: Repository URL
        license:
          type: string
          description: License type
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
        authentication:
          type: object
          description: Authentication configuration

    AgentListResponse:
      type: object
      required:
        - agents
        - _meta
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        _meta:
          $ref: '#/components/schemas/PaginationMeta'

    Agent:
      type: object
      required:
        - id
        - name
        - description
      properties:
        id:
          type: string
          description: Agent identifier (reverse-DNS format)
        name:
          type: string
          description: Display name
        description:
          type: string
          description: Agent description
        url:
          type: string
          format: uri
          description: Agent URL
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'

    Skill:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: Skill name
        description:
          type: string
          description: Skill description
        input_schema:
          type: object
          description: JSON schema for skill input

    AgentVersionDetail:
      type: object
      required:
        - id
        - name
        - description
        - version
      properties:
        id:
          type: string
          description: Agent identifier
        name:
          type: string
        description:
          type: string
        version:
          type: string
        url:
          type: string
          format: uri
        provider:
          type: string
          description: Agent provider
        visibility:
          type: string
          enum: [public, private, internal]
        license:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        security_schemes:
          type: object
          description: Security schemes supported by agent

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message
        error_code:
          type: string
          description: Optional error code
        request_id:
          type: string
          description: Unique request identifier
